<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Desatadora de Nós</title>

  <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>

  <script>
    window.pixelId = "6960563b5a131e2c09c4b7e7";
    var a = document.createElement("script");
    a.setAttribute("async", "");
    a.setAttribute("defer", "");
    a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
    document.head.appendChild(a);
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #c9920a 0%, #8b6000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 22px 16px 38px;
      overflow-x: hidden;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      background: #fff;
      position: relative;
    }

    .hero {
      width: 64%;
      max-width: 230px;
      height: auto;
      display: block;
      margin: 14px auto 6px;
      border-radius: 12px;
    }

    .hero-placeholder {
      width: 100%;
      height: 220px;
      background: linear-gradient(160deg, #f5d98a 0%, #c9920a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-placeholder span {
      font-size: 90px;
      opacity: 0.6;
    }

    .badge {
      background: linear-gradient(90deg, #5a3a00, #8b6000, #5a3a00);
      color: #f5d98a;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .badge-icon {
      font-size: 16px;
    }

    .content {
      background: #fffef7;
      padding: 24px 22px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 6vw, 30px);
      font-weight: 900;
      color: #1a1008;
      text-align: center;
      line-height: 1.18;
    }

    .headline em {
      font-style: italic;
      color: #8b6000;
    }

    .subheadline {
      font-size: 12px;
      font-weight: 700;
      color: #8b6000;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      text-align: center;
    }

    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 17px 20px;
      background: linear-gradient(135deg, #e8a800, #f5c518, #d49200);
      color: #1a1008;
      font-size: 18px;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 5px 18px rgba(180, 120, 0, 0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: glow 2.4s ease-in-out infinite;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(180, 120, 0, 0.7);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 5px 18px rgba(180, 120, 0, 0.45);
      }

      50% {
        box-shadow: 0 5px 30px rgba(180, 120, 0, 0.80);
      }
    }

    .instant {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #777;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
      font-size: 11px;
      line-height: 2;
      padding: 0 10px;
    }

    footer a {
      color: rgba(255, 255, 255, 0.95);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup-box {
      width: 100%;
      max-width: 720px;
      max-height: 88vh;
      overflow-y: auto;
      background: #fffef7;
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
      border: 2px solid #f5c518;
      animation: popupIn 0.25s ease;
    }

    @keyframes popupIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .popup-header {
      background: linear-gradient(90deg, #5a3a00, #8b6000, #5a3a00);
      color: #f5d98a;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .popup-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      line-height: 1.2;
    }

    .popup-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }

    .popup-content {
      padding: 24px 24px 28px;
      color: #2c1b09;
      font-size: 14px;
      line-height: 1.8;
    }

    .popup-content h3 {
      color: #8b6000;
      margin: 18px 0 8px;
      font-size: 17px;
    }

    .popup-content p {
      margin-bottom: 12px;
    }

    @media (max-width: 480px) {

      body {
        padding: 12px 10px 28px;
      }

      .card {
        max-width: 100%;
        border-radius: 20px;
      }

      /* AQUI FOI O AJUSTE PRINCIPAL */
      .hero {
        width: 52%;
        max-width: 165px;
        margin: 10px auto 4px;
      }

      .badge {
        font-size: 11px;
        padding: 8px 14px;
      }

      .content {
        padding: 18px 18px 24px;
        gap: 10px;
      }

      .headline {
        font-size: 22px;
        line-height: 1.12;
      }

      .subheadline {
        font-size: 10px;
        letter-spacing: 1.8px;
      }

      .cta-btn {
        font-size: 16px;
        padding: 15px 18px;
      }

      .instant {
        font-size: 12px;
      }

      footer {
        margin-top: 18px;
        font-size: 10px;
        line-height: 1.8;
      }

      .popup-header h2 {
        font-size: 21px;
      }

      .popup-content {
        padding: 20px;
        font-size: 13.5px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <img class="hero" src="./images/nossa-senhora-desatadora.jpg" alt="Desatadora de Nós" onerror="this.outerHTML='<div class=\'hero-placeholder\'><span>🙏</span></div>'">

    <div class="badge">
      <span class="badge-icon">✨</span>
      DESATADORA DE NÓS
      <span class="badge-icon">✨</span>
    </div>

    <div class="content">

      <h1 class="headline">
        Escute essa <em>oração<br>de 7 palavras</em>
      </h1>

      <p class="subheadline">Clique abaixo e Ouça agora</p>

      <a href="../mensagembibIicasobreapaz" class="cta-btn" id="cta-btn">

        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"></path>
          <path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445z"></path>
        </svg>

        Ouvir Agora

      </a>

      <div class="instant">

        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="#8b6000" viewBox="0 0 16 16">
          <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
        </svg>

        Acesso imediato e gratuito

      </div>

    </div>
  </div>

  <footer>
    © 2026 Desatadora de Nós. Todos os direitos reservados.<br>

    <a onclick="abrirPopup('termos')">Termos de Uso</a>
    ·
    <a onclick="abrirPopup('privacidade')">Política de Privacidade</a>
  </footer>

  <div class="popup-overlay" id="popupOverlay">

    <div class="popup-box">

      <div class="popup-header">

        <h2 id="popupTitle">Termos de Uso</h2>

        <button class="popup-close" onclick="fecharPopup()">×</button>

      </div>

      <div class="popup-content" id="popupContent"></div>

    </div>

  </div>

  <script>
    (function () {

      var params = window.location.search;

      if (!params) return;

      var btn = document.getElementById('cta-btn');

      var base = btn.href;

      btn.href = base + (base.indexOf('?') !== -1 ? '&' : '?') + params.slice(1);

    })();

    const conteudosPopup = {

      termos: {

        titulo: 'Termos de Uso',

        texto: `
          <p>Ao acessar esta página, você concorda com os presentes Termos de Uso.</p>

          <h3>1. Finalidade do Conteúdo</h3>

          <p>O conteúdo apresentado possui finalidade informativa, espiritual e devocional.</p>

          <h3>2. Uso da Página</h3>

          <p>Você se compromete a utilizar esta página de forma adequada.</p>

          <h3>3. Responsabilidade</h3>

          <p>Esta página não substitui orientação profissional.</p>
        `
      },

      privacidade: {

        titulo: 'Política de Privacidade',

        texto: `
          <p>A sua privacidade é importante para nós.</p>

          <h3>1. Coleta de Informações</h3>

          <p>Podemos coletar dados básicos de navegação para melhorar a experiência.</p>

          <h3>2. Cookies</h3>

          <p>Cookies podem ser utilizados para análise de desempenho e campanhas.</p>

          <h3>3. Segurança</h3>

          <p>Adotamos medidas razoáveis para proteger as informações.</p>
        `
      }
    };

    function abrirPopup(tipo) {

      const popup = conteudosPopup[tipo];

      document.getElementById('popupTitle').innerHTML = popup.titulo;

      document.getElementById('popupContent').innerHTML = popup.texto;

      document.getElementById('popupOverlay').classList.add('active');

      document.body.style.overflow = 'hidden';
    }

    function fecharPopup() {

      document.getElementById('popupOverlay').classList.remove('active');

      document.body.style.overflow = '';
    }

    document.getElementById('popupOverlay').addEventListener('click', function (event) {

      if (event.target === this) {

        fecharPopup();

      }

    });

    document.addEventListener('keydown', function (event) {

      if (event.key === 'Escape') {

        fecharPopup();

      }

    });
  </script>

</body>

</html>
